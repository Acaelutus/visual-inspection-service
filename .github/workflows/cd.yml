# CD — Continuous Deployment.
# Запускается только при push в master (после успешного merge).
# Собирает Docker образ → пушит в AWS ECR → (опционально) деплоит на ECS.
#
# Требует GitHub Secrets:
#   AWS_ACCESS_KEY_ID     — ключ IAM пользователя с правами ECR + ECS
#   AWS_SECRET_ACCESS_KEY — секрет IAM пользователя

name: CD — Deploy to AWS

on:
  push:
    branches: [master]

env:
  AWS_REGION: eu-west-1                        # регион AWS
  ECR_REPOSITORY: visual-inspection-service   # имя репозитория в ECR

jobs:

  push-to-ecr:
    name: Build and push to Amazon ECR
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # Настраиваем AWS CLI с credentials из GitHub Secrets
      # Secrets хранятся зашифрованными в GitHub и подставляются только в Actions
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      # Логинимся в ECR — получаем временный токен для docker push
      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      # Собираем образ с двумя тегами:
      # - git SHA (уникальный, неизменяемый — для rollback)
      # - latest (указывает на последнюю версию)
      - name: Build, tag, and push image to ECR
        id: build-image
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          docker build \
            -t $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG \
            -t $ECR_REGISTRY/$ECR_REPOSITORY:latest \
            .

          docker push $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:latest

          echo "image=$ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG" >> $GITHUB_OUTPUT

      - name: Print deployed image
        run: echo "Задеплоен образ → ${{ steps.build-image.outputs.image }}"

