# Docker Compose для мониторинга: Prometheus + Grafana + MLflow.
#
# Запуск:  docker compose -f docker/docker-compose.monitoring.yml up -d
# Стоп:    docker compose -f docker/docker-compose.monitoring.yml down
#
# После запуска:
#   Prometheus: http://localhost:9090
#   Grafana:    http://localhost:3000  (admin / admin)
#   MLflow:     http://localhost:5000

services:
  prometheus:
    image: prom/prometheus:v2.50.1
    ports:
      - "9090:9090"
    volumes:
      # Монтируем наш prometheus.yml внутрь контейнера
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--storage.tsdb.retention.time=7d"  # хранить данные 7 дней

  grafana:
    image: grafana/grafana:10.3.1
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=admin   # пароль по умолчанию
      - GF_USERS_ALLOW_SIGN_UP=false       # отключаем публичную регистрацию
    volumes:
      # Grafana автоматически читает файлы provisioning при старте
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
      - ./grafana/dashboards:/var/lib/grafana/dashboards:ro
      - grafana_data:/var/lib/grafana
    depends_on:
      - prometheus

  mlflow:
    image: ghcr.io/mlflow/mlflow:v2.11.1
    ports:
      - "5000:5000"
    volumes:
      - mlflow_data:/mlflow
    # --backend-store-uri: где хранить метаданные экспериментов
    # --default-artifact-root: где хранить артефакты (модели, графики)
    command: >
      mlflow server
      --host 0.0.0.0
      --port 5000
      --backend-store-uri /mlflow/tracking
      --default-artifact-root /mlflow/artifacts

volumes:
  prometheus_data:
  grafana_data:
  mlflow_data:
